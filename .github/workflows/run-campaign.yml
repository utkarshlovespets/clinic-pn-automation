name: Run Campaign

on:
  schedule:
    # 12:00 PM IST → 06:30 UTC
    - cron: '30 4 * * *'

    # 5:00 PM IST → 11:30 UTC
    - cron: '30 11 * * *'

  workflow_dispatch:

jobs:
  run-campaign:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Run campaign
      - name: Run campaign (live)
        run: |
          python run_campaign.py --live
