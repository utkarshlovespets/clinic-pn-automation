name: Run Campaign Pipeline

on:
  workflow_dispatch:
    inputs:
      slot:
        description: 'Choose Slot to Run'
        required: true
        type: choice
        options:
          - morning
          - evening

jobs:
  run-campaign:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python 3.14
        uses: actions/setup-python@v4
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env
        run: echo "${{ secrets.ENV_FILE }}" > .env

      - name: Create credentials.json
        run: echo '${{ secrets.GOOGLE_CREDENTIALS }}' > credentials.json

      - name: Create token.json
        run: echo '${{ secrets.GOOGLE_TOKEN }}' > token.json

      # Generate today's date in IST
      - name: Set date (IST)
        run: echo "TODAY=$(TZ='Asia/Kolkata' date +'%d%m%Y')" >> $GITHUB_ENV

      # Run based on selected slot
      - name: Run campaign (LIVE)
        run: |
          echo "Running ${{ github.event.inputs.slot }} campaign for date $TODAY"
          python run_campaign.py --slot ${{ github.event.inputs.slot }} --date $TODAY --live